name: Deploy to server

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ui_version:
        description: 'UI image tag (default latest, or e.g. v1.2.3)'
        required: false
        default: 'latest'
      api_version:
        description: 'API image tag (default latest, or e.g. v1.2.3)'
        required: false
        default: 'latest'
      mosquitto_version:
        description: 'Mosquitto image tag (default 2 or pin e.g. 2.0.18)'
        required: false
        default: '2'
      mmdvm_link_server_version:
        description: 'mmdvm-link-server image tag (default latest or pin e.g. v0.1.0)'
        required: false
        default: 'latest'
      enable_mmdvm_link:
        description: 'Enable mmdvm-link PoC services (true/false)'
        required: false
        default: 'true'
      force_deploy:
        description: 'Skip downgrade check (true/false)'
        required: false
        default: 'false'

# UI/API repos and GHCR images are private. Use a Classic PAT (fine-grained does not support packages).
# REPO_ACCESS_TOKEN: Classic PAT with repo + read:packages. GHCR login uses github.repository_owner.
env:
  SERVER_DIR: /opt/trac
  VERSIONS_FILE: .versions
  UI_REPO: ${{ github.repository_owner }}/trac-portal-ui
  API_REPO: ${{ github.repository_owner }}/trac-portal-api
  MMDVM_REPO: ${{ github.repository_owner }}/mmdvm-link

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          MISSING=
          [ -z "${{ secrets.SSH_HOST }}" ] && MISSING="${MISSING} SSH_HOST"
          [ -z "${{ secrets.SSH_USER }}" ] && MISSING="${MISSING} SSH_USER"
          [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ] && MISSING="${MISSING} SSH_PRIVATE_KEY"
          [ -z "${{ secrets.REPO_ACCESS_TOKEN }}" ] && MISSING="${MISSING} REPO_ACCESS_TOKEN"
          if [ -n "$MISSING" ]; then
            echo "::error::Deploy requires the following repository secrets to be set:$MISSING"
            echo "Configure them under Settings → Secrets and variables → Actions."
            echo "REPO_ACCESS_TOKEN: Classic PAT (not fine-grained) with repo + read:packages."
            exit 1
          fi
          echo "Required secrets are set."

      - name: Resolve or validate tags (UI, API, mmdvm-link in parallel)
        id: tags
        env:
          UI_REPO: ${{ env.UI_REPO }}
          API_REPO: ${{ env.API_REPO }}
          MMDVM_REPO: ${{ env.MMDVM_REPO }}
          GH_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
        run: |
          set -e
          curl_() { curl -sS ${GH_TOKEN:+-H "Authorization: Bearer $GH_TOKEN"} "$@"; }

          resolve_ui() {
            WANTED="${{ github.event.inputs.ui_version }}"
            if [ -z "$WANTED" ] || [ "$WANTED" = "latest" ]; then
              TAG=$(curl_ "https://api.github.com/repos/${UI_REPO}/releases/latest" | jq -r '.tag_name // empty')
              [ -z "$TAG" ] && TAG=$(curl_ "https://api.github.com/repos/${UI_REPO}/tags?per_page=1" | jq -r 'if type == "array" and length > 0 then .[0].name else empty end')
              [ -z "$TAG" ] && { echo "::error::No release or tag in ${UI_REPO}. Create a tag first."; return 1; }
            else
              TAG="$WANTED"
              HTTP=$(curl_ -o /dev/null -w "%{http_code}" "https://api.github.com/repos/${UI_REPO}/git/ref/tags/${TAG}")
              [ "$HTTP" != "200" ] && { echo "::error::UI tag '${TAG}' does not exist in ${UI_REPO}."; return 1; }
            fi
            echo "$TAG" > /tmp/ui_tag
          }

          resolve_api() {
            WANTED="${{ github.event.inputs.api_version }}"
            if [ -z "$WANTED" ] || [ "$WANTED" = "latest" ]; then
              TAG=$(curl_ "https://api.github.com/repos/${API_REPO}/releases/latest" | jq -r '.tag_name // empty')
              [ -z "$TAG" ] && TAG=$(curl_ "https://api.github.com/repos/${API_REPO}/tags?per_page=1" | jq -r 'if type == "array" and length > 0 then .[0].name else empty end')
              [ -z "$TAG" ] && { echo "::error::No release or tag in ${API_REPO}. Create a tag first."; return 1; }
            else
              TAG="$WANTED"
              HTTP=$(curl_ -o /dev/null -w "%{http_code}" "https://api.github.com/repos/${API_REPO}/git/ref/tags/${TAG}")
              [ "$HTTP" != "200" ] && { echo "::error::API tag '${TAG}' does not exist in ${API_REPO}."; return 1; }
            fi
            echo "$TAG" > /tmp/api_tag
          }

          resolve_mmdvm() {
            WANTED="${{ github.event.inputs.mmdvm_link_server_version }}"
            REPO="${MMDVM_REPO}"
            if [ -z "$WANTED" ] || [ "$WANTED" = "latest" ]; then
              TAG=$(curl_ "https://api.github.com/repos/${REPO}/releases/latest" | jq -r '.tag_name // empty')
              [ -z "$TAG" ] && TAG=$(curl_ "https://api.github.com/repos/${REPO}/tags?per_page=100" | jq -r 'if type == "array" then (map(.name) | map(select(startswith("v"))) | .[0] // empty) else empty end')
              [ -z "$TAG" ] && { echo "::error::No release or v* tag in ${REPO}. Create a v* tag first (e.g. v0.1.0)."; return 1; }
            else
              TAG="$WANTED"
              HTTP=$(curl_ -o /dev/null -w "%{http_code}" "https://api.github.com/repos/${REPO}/git/ref/tags/${TAG}")
              [ "$HTTP" != "200" ] && { echo "::error::mmdvm-link-server tag '${TAG}' does not exist in ${REPO}."; return 1; }
            fi
            echo "$TAG" > /tmp/mmdvm_tag
          }

          (resolve_ui; echo $? > /tmp/ui_rc) &
          (resolve_api; echo $? > /tmp/api_rc) &
          (resolve_mmdvm; echo $? > /tmp/mmdvm_rc) &
          wait
          [ "$(cat /tmp/ui_rc)" = "0" ] || exit 1
          [ "$(cat /tmp/api_rc)" = "0" ] || exit 1
          [ "$(cat /tmp/mmdvm_rc)" = "0" ] || exit 1
          echo "ui_tag=$(cat /tmp/ui_tag)" >> "$GITHUB_OUTPUT"
          echo "api_tag=$(cat /tmp/api_tag)" >> "$GITHUB_OUTPUT"
          echo "mmdvm_tag=$(cat /tmp/mmdvm_tag)" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Get current versions from server
        id: current
        run: |
          CONTENT=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "cat ${{ env.SERVER_DIR }}/${{ env.VERSIONS_FILE }} 2>/dev/null" || true)
          echo "content<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CONTENT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Check downgrade
        run: |
          if [ "${{ github.event.inputs.force_deploy }}" = "true" ]; then
            echo "Force deploy enabled. Skipping downgrade check."
            exit 0
          fi

          CONTENT="${{ steps.current.outputs.content }}"
          CURR_UI=$(echo "$CONTENT" | grep '^UI_VERSION=' | cut -d= -f2- | tr -d '\r')
          CURR_API=$(echo "$CONTENT" | grep '^API_VERSION=' | cut -d= -f2- | tr -d '\r')
          NEW_UI="${{ steps.tags.outputs.ui_tag }}"
          NEW_API="${{ steps.tags.outputs.api_tag }}"
          norm() { echo "$1" | sed 's/^v//'; }
          # If no version file or empty, skip check (first deploy)
          if [ -z "$CURR_UI" ] && [ -z "$CURR_API" ]; then
            echo "No existing version file, skipping downgrade check."
            exit 0
          fi
          ver_lte() {
            L=$(norm "$1"); R=$(norm "$2")
            [ -z "$L" ] || [ -z "$R" ] && return 0
            SMALLEST=$(echo -e "${L}\n${R}" | sort -V | head -1)
            [ "$SMALLEST" = "$L" ]
          }
          FAIL=0
          if [ -n "$CURR_UI" ] && [ -n "$NEW_UI" ] && ! ver_lte "$CURR_UI" "$NEW_UI"; then
            echo "Downgrade not allowed: UI $CURR_UI -> $NEW_UI"
            FAIL=1
          fi
          if [ -n "$CURR_API" ] && [ -n "$NEW_API" ] && ! ver_lte "$CURR_API" "$NEW_API"; then
            echo "Downgrade not allowed: API $CURR_API -> $NEW_API"
            FAIL=1
          fi
          [ $FAIL -eq 1 ] && exit 1
          echo "Version check passed."

      - name: Sync files to server
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "mkdir -p ${{ env.SERVER_DIR }}"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new docker-compose.yml update.sh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.SERVER_DIR }}/"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -r server/mmdvm-link "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.SERVER_DIR }}/server/"
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "chmod +x ${{ env.SERVER_DIR }}/update.sh"

      - name: Login to GHCR on server
        run: |
          # Pass token via base64 to avoid shell escaping (quotes, $, \) breaking login
          TOKEN_B64=$(printf '%s' "${{ secrets.REPO_ACCESS_TOKEN }}" | base64 -w 0)
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "echo '$TOKEN_B64' | base64 -d | docker login ghcr.io -u '${{ github.repository_owner }}' --password-stdin"

      - name: Write version and env on server
        run: |
          MOSQUITTO_TAG="${{ github.event.inputs.mosquitto_version }}"
          ENABLE_MMDVM_LINK="${{ github.event.inputs.enable_mmdvm_link }}"
          [ -z "$MOSQUITTO_TAG" ] && MOSQUITTO_TAG="2"
          [ -z "$ENABLE_MMDVM_LINK" ] && ENABLE_MMDVM_LINK="true"

          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "cd ${{ env.SERVER_DIR }} && \
            echo 'UI_VERSION=${{ steps.tags.outputs.ui_tag }}' > ${{ env.VERSIONS_FILE }} && \
            echo 'API_VERSION=${{ steps.tags.outputs.api_tag }}' >> ${{ env.VERSIONS_FILE }} && \
            echo 'MOSQUITTO_VERSION='"$MOSQUITTO_TAG" >> ${{ env.VERSIONS_FILE }} && \
            echo 'MMDVM_LINK_SERVER_VERSION=${{ steps.tags.outputs.mmdvm_tag }}' >> ${{ env.VERSIONS_FILE }}"
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "cd ${{ env.SERVER_DIR }} && \
            (test -f .env && grep -v '^UI_TAG=\|^API_TAG=\|^MOSQUITTO_TAG=\|^MMDVM_LINK_SERVER_TAG=\|^ENABLE_MMDVM_LINK=' .env || true) > .env.tmp && \
            echo 'UI_TAG=${{ steps.tags.outputs.ui_tag }}' >> .env.tmp && \
            echo 'API_TAG=${{ steps.tags.outputs.api_tag }}' >> .env.tmp && \
            echo 'MOSQUITTO_TAG='"$MOSQUITTO_TAG" >> .env.tmp && \
            echo 'MMDVM_LINK_SERVER_TAG=${{ steps.tags.outputs.mmdvm_tag }}' >> .env.tmp && \
            echo 'ENABLE_MMDVM_LINK='"$ENABLE_MMDVM_LINK" >> .env.tmp && \
            mv .env.tmp .env"

      - name: Deploy (pull and restart)
        continue-on-error: true
        run: |
          MOSQUITTO_TAG="${{ github.event.inputs.mosquitto_version }}"
          ENABLE_MMDVM_LINK="${{ github.event.inputs.enable_mmdvm_link }}"
          [ -z "$MOSQUITTO_TAG" ] && MOSQUITTO_TAG="2"
          [ -z "$ENABLE_MMDVM_LINK" ] && ENABLE_MMDVM_LINK="true"

          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cd ${{ env.SERVER_DIR }} && export UI_TAG='${{ steps.tags.outputs.ui_tag }}' && export API_TAG='${{ steps.tags.outputs.api_tag }}' && export MOSQUITTO_TAG='$MOSQUITTO_TAG' && export MMDVM_LINK_SERVER_TAG='${{ steps.tags.outputs.mmdvm_tag }}' && export ENABLE_MMDVM_LINK='$ENABLE_MMDVM_LINK' && ./update.sh"

      - name: Server diagnostics (always)
        if: always()
        continue-on-error: true
        run: |
          echo "::group::docker ps -a"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "cd ${{ env.SERVER_DIR }} && docker ps -a" || true
          echo "::endgroup::"

          echo "::group::docker compose ps"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "cd ${{ env.SERVER_DIR }} && docker compose ps" || true
          echo "::endgroup::"

          echo "::group::mosquitto logs (last 400 lines)"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "cd ${{ env.SERVER_DIR }} && docker compose logs mosquitto --tail=400" || true
          echo "::endgroup::"

          echo "::group::mmdvm-link-server logs (last 400 lines)"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "cd ${{ env.SERVER_DIR }} && docker compose logs mmdvm-link-server --tail=400" || true
          echo "::endgroup::"

          echo "::group::docker compose logs (last 300 lines, all services)"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "cd ${{ env.SERVER_DIR }} && docker compose logs --tail=300" || true
          echo "::endgroup::"
